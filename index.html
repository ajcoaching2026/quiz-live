<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Practice Test Portal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-bar">
        <span class="back-arrow">&#8592;</span>
        <h2 class="subject-title">Practice Test Series</h2>
        <span class="menu-icon">&#8942;</span>
    </div>

    <div class="stats-bar">
        <div id="timer" class="stat-item">⏱️ 00:30:00</div>
        <div id="progress-header" class="stat-item">📝 40 Questions</div>
    </div>

    <div class="container">
        <div id="loading-profile">⚡ Loading Test Profile from Google Sheets...</div>

        <div id="quiz-box" style="display: none;">
            <div id="question-text" class="question-card">Sawaal load ho raha hai...</div>
            
            <div id="options-container"></div>

            <div class="bottom-nav">
                <button id="prev-btn" class="nav-btn btn-secondary">⬅️ Previous</button>
                <button id="clear-btn" class="nav-btn btn-clear">🧼 Clear</button>
                <button id="next-btn" class="nav-btn btn-primary">Next ➡️</button>
            </div>
        </div>

        <div id="result-box" class="scorecard-container" style="display: none;">
            <h3>📊 Test Scorecard</h3>
            <div class="score-display">
                <span class="score-number" id="score-marks">0</span>
                <span class="score-label">Total Marks</span>
            </div>
            <div class="stats-grid">
                <div class="stat-box correct"><span id="score-correct">0</span><p>Correct</p></div>
                <div class="stat-box wrong"><span id="score-wrong">0</span><p>Wrong</p></div>
                <div class="stat-box skipped"><span id="score-skipped">0</span><p>Skipped</p></div>
            </div>
            <button class="action-btn-primary" onclick="toggleReview()">🔍 Review Questions & Explanations</button>
            <button class="action-btn-secondary" onclick="retakeTest()">🔄 Re-take Test</button>
            
            <div id="review-panel" style="display: none;">
                <hr style="border: 1px solid #ddd; margin-bottom: 20px;">
                <h2 style="color:#2c3e50; text-align:center; margin-bottom: 20px;">📝 Question Paper Review</h2>
                <div id="review-list"></div>
            </div>
        </div>
    </div>

    <div id="fab-grid-btn" class="fab-btn" onclick="openDrawer()">
        <span>☰</span>
        <div id="fab-badge" class="fab-badge">...</div>
    </div>

    <div id="drawer-overlay" class="drawer-overlay" onclick="closeDrawer()"></div>
    <div id="question-drawer" class="question-drawer">
        <div class="drawer-header">
            <h3>All Questions</h3>
            <button class="close-drawer-btn" onclick="closeDrawer()">✕</button>
        </div>
        <div class="drawer-legend">
            <span class="legend-item"><span class="dot current"></span> Current</span>
            <span class="legend-item"><span class="dot attempted"></span> Attempted</span>
            <span class="legend-item"><span class="dot unattempted"></span> Pending</span>
        </div>
        <div id="questions-grid" class="questions-grid"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
